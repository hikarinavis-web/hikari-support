<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>郵便番号 一括判定ツール</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0;padding:20px;}
.card{background:white;padding:24px;border-radius:12px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;}
input,select{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:15px;box-sizing:border-box;}
button{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;font-size:15px;margin:4px;}
.add{background:#0070f3;color:white;}
.csv{background:#16a34a;color:white;}
.import{background:#9333ea;color:white;}
.delete{background:#ef4444;color:white;}
.db{background:#0f766e;color:white;}
table{width:100%;border-collapse:collapse;background:white;margin-top:16px;}
th,td{border:1px solid #ddd;padding:9px;font-size:13px;text-align:left;}
th{background:#eee;}
a{color:#2563eb;text-decoration:none;}
</style>
</head>

<body>

<h1>郵便番号 一括判定ツール</h1>

<div class="card">
<h2>① 郵便番号別 判定DB登録</h2>

<div class="grid">
<input id="dbZipcode" placeholder="郵便番号 例：0640805">
<input id="dbAreaMemo" placeholder="エリアメモ 例：札幌市中央区">

<select id="dbBiglobe1g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
</select>

<select id="dbBiglobe10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
</select>

<select id="dbNuro2g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
</select>

<select id="dbNuro10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
</select>

<input id="dbCheckDate" type="date">
<input id="dbMemo" placeholder="メモ">
</div>

<button class="db" onclick="saveArea()">判定DBに保存</button>

<p>
<a href="https://order.sso.biglobe.ne.jp/fixed/hikari/check-area/1" target="_blank">BIGLOBE確認</a>
　
<a href="https://nuro.jp/area/area_search/index_a.html" target="_blank">NURO確認</a>
</p>
</div>

<div class="card">
<h2>② CSV一括判定</h2>

<p>CSV形式例：<br>
郵便番号だけ → <b>郵便番号</b><br>
顧客込み → <b>名前,電話番号,郵便番号,住所</b>
</p>

<button class="import" onclick="document.getElementById('bulkCsv').click()">CSV読み込み</button>
<input type="file" id="bulkCsv" accept=".csv" style="display:none">

<button class="csv" onclick="downloadJudgedCSV()">判定済みCSV出力</button>
<button class="csv" onclick="downloadUnknownCSV()">未登録だけCSV出力</button>

<p id="summary">判定件数：0件 / 登録済み：0件 / 未登録：0件</p>
</div>

<div class="card">
<h2>③ 一括判定結果</h2>

<table>
<thead>
<tr>
<th>名前</th>
<th>電話番号</th>
<th>郵便番号</th>
<th>住所</th>
<th>BIGLOBE 1G</th>
<th>BIGLOBE 10G</th>
<th>NURO 2G</th>
<th>NURO 10G</th>
<th>判定根拠</th>
<th>確認日</th>
<th>提案候補</th>
</tr>
</thead>
<tbody id="resultTable"></tbody>
</table>
</div>

<div class="card">
<h2>④ 判定DB一覧</h2>

<table>
<thead>
<tr>
<th>郵便番号</th>
<th>エリア</th>
<th>BIGLOBE 1G</th>
<th>BIGLOBE 10G</th>
<th>NURO 2G</th>
<th>NURO 10G</th>
<th>確認日</th>
<th>メモ</th>
<th>操作</th>
</tr>
</thead>
<tbody id="areaTable"></tbody>
</table>
</div>

<script>
let areaDB = JSON.parse(localStorage.getItem("areaDB")) || [];
let bulkResults = [];

function cleanZip(zip){
  return String(zip || "").replace(/[^0-9]/g,"").padStart(7,"0");
}

function saveAreaDB(){
  localStorage.setItem("areaDB", JSON.stringify(areaDB));
}

function findAreaByZip(zipcode){
  const zip = cleanZip(zipcode);
  return areaDB.find(a => a.zipcode === zip);
}

function suggestPlan(biglobe1g,biglobe10g,nuro2g,nuro10g){
  if(biglobe10g === "提供中") return "ドコモ光10G / BIGLOBE10G";
  if(nuro10g === "提供中") return "NURO 10G";
  if(biglobe1g === "提供中") return "光コラボ / BIGLOBE 1G";
  if(nuro2g === "提供中") return "NURO 2G";
  if(biglobe1g === "未提供" && nuro2g === "未提供") return "home 5G / SoftBank Air / WiMAX";
  return "公式確認・ヒアリング優先";
}

function saveArea(){
  const zipcode = cleanZip(document.getElementById("dbZipcode").value);
  const areaMemo = document.getElementById("dbAreaMemo").value;
  const biglobe1g = document.getElementById("dbBiglobe1g").value;
  const biglobe10g = document.getElementById("dbBiglobe10g").value;
  const nuro2g = document.getElementById("dbNuro2g").value;
  const nuro10g = document.getElementById("dbNuro10g").value;
  const checkDate = document.getElementById("dbCheckDate").value;
  const memo = document.getElementById("dbMemo").value;

  if(!zipcode || zipcode.length !== 7){
    alert("7桁の郵便番号を入力してください");
    return;
  }

  const data = {zipcode,areaMemo,biglobe1g,biglobe10g,nuro2g,nuro10g,checkDate,memo};
  const index = areaDB.findIndex(a => a.zipcode === zipcode);

  if(index >= 0){
    areaDB[index] = data;
  }else{
    areaDB.push(data);
  }

  saveAreaDB();
  renderAreaDB();
  alert("判定DBに保存しました");
}

document.getElementById("bulkCsv").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){
    const text = event.target.result.replace(/\r/g,"");
    const rows = text.split("\n").filter(r => r.trim() !== "");

    bulkResults = [];

    rows.forEach((row, i) => {
      const cols = row.split(",").map(c => c.replace(/^"|"$/g,"").trim());

      if(i === 0 && cols.some(c => c.includes("郵便番号"))){
        return;
      }

      let name = "";
      let phone = "";
      let zipcode = "";
      let address = "";

      if(cols.length === 1){
        zipcode = cols[0];
      }else{
        name = cols[0] || "";
        phone = cols[1] || "";
        zipcode = cols[2] || "";
        address = cols[3] || "";
      }

      const zip = cleanZip(zipcode);
      const area = findAreaByZip(zip);

      let result;

      if(area){
        result = {
          name,
          phone,
          zipcode: zip,
          address,
          biglobe1g: area.biglobe1g,
          biglobe10g: area.biglobe10g,
          nuro2g: area.nuro2g,
          nuro10g: area.nuro10g,
          source: "郵便番号DB",
          checkDate: area.checkDate || "",
          suggestion: suggestPlan(area.biglobe1g,area.biglobe10g,area.nuro2g,area.nuro10g)
        };
      }else{
        result = {
          name,
          phone,
          zipcode: zip,
          address,
          biglobe1g: "要確認",
          biglobe10g: "要確認",
          nuro2g: "要確認",
          nuro10g: "要確認",
          source: "未登録",
          checkDate: "",
          suggestion: "公式確認が必要"
        };
      }

      bulkResults.push(result);
    });

    renderResults();
  };

  reader.readAsText(file, "UTF-8");
});

function renderResults(){
  const tbody = document.getElementById("resultTable");
  tbody.innerHTML = "";

  let known = 0;
  let unknown = 0;

  bulkResults.forEach(r => {
    if(r.source === "郵便番号DB") known++;
    if(r.source === "未登録") unknown++;

    tbody.innerHTML += `
      <tr>
        <td>${r.name}</td>
        <td>${r.phone}</td>
        <td>${r.zipcode}</td>
        <td>${r.address}</td>
        <td>${r.biglobe1g}</td>
        <td>${r.biglobe10g}</td>
        <td>${r.nuro2g}</td>
        <td>${r.nuro10g}</td>
        <td>${r.source}</td>
        <td>${r.checkDate}</td>
        <td>${r.suggestion}</td>
      </tr>
    `;
  });

  document.getElementById("summary").innerText =
    `判定件数：${bulkResults.length}件 / 登録済み：${known}件 / 未登録：${unknown}件`;
}

function renderAreaDB(){
  const tbody = document.getElementById("areaTable");
  tbody.innerHTML = "";

  areaDB.forEach((a,index) => {
    tbody.innerHTML += `
      <tr>
        <td>${a.zipcode}</td>
        <td>${a.areaMemo || ""}</td>
        <td>${a.biglobe1g}</td>
        <td>${a.biglobe10g}</td>
        <td>${a.nuro2g}</td>
        <td>${a.nuro10g}</td>
        <td>${a.checkDate || ""}</td>
        <td>${a.memo || ""}</td>
        <td><button class="delete" onclick="deleteArea(${index})">削除</button></td>
      </tr>
    `;
  });
}

function deleteArea(index){
  if(confirm("削除しますか？")){
    areaDB.splice(index,1);
    saveAreaDB();
    renderAreaDB();
  }
}

function csvEscape(value){
  return `"${String(value || "").replace(/"/g,'""')}"`;
}

function downloadJudgedCSV(){
  if(bulkResults.length === 0){
    alert("先にCSVを読み込んでください");
    return;
  }

  let csv = "名前,電話番号,郵便番号,住所,BIGLOBE1G,BIGLOBE10G,NURO2G,NURO10G,判定根拠,確認日,提案候補\n";

  bulkResults.forEach(r => {
    csv += [
      r.name,r.phone,r.zipcode,r.address,
      r.biglobe1g,r.biglobe10g,r.nuro2g,r.nuro10g,
      r.source,r.checkDate,r.suggestion
    ].map(csvEscape).join(",") + "\n";
  });

  downloadFile(csv,"判定済みリスト.csv");
}

function downloadUnknownCSV(){
  const unknowns = bulkResults.filter(r => r.source === "未登録");

  if(unknowns.length === 0){
    alert("未登録データはありません");
    return;
  }

  let csv = "名前,電話番号,郵便番号,住所\n";

  unknowns.forEach(r => {
    csv += [r.name,r.phone,r.zipcode,r.address].map(csvEscape).join(",") + "\n";
  });

  downloadFile(csv,"未登録リスト.csv");
}

function downloadFile(csv,filename){
  const blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = filename;
  a.click();
}

renderAreaDB();
</script>

</body>
</html>
