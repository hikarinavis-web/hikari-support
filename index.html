<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提供エリア確認ツール</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0;padding:20px;}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;}
input,select{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;}
button{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;margin:4px;}
.biglobe{background:#0070f3;color:white;}
.nuro{background:#16a34a;color:white;}
.save{background:#9333ea;color:white;}
iframe{width:100%;height:650px;border:1px solid #ccc;border-radius:12px;background:white;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{border:1px solid #ddd;padding:8px;font-size:14px;}
th{background:#eee;}
</style>
</head>

<body>

<h1>提供エリア確認ツール</h1>

<div class="card">
<h2>顧客情報</h2>

<div class="grid">
<input id="name" placeholder="名前">
<input id="phone" placeholder="電話番号">
<input id="zipcode" placeholder="郵便番号">
<input id="address" placeholder="住所">
</div>

<button class="biglobe" onclick="openBiglobe()">BIGLOBE確認を画面内で開く</button>
<button class="nuro" onclick="openNuro()">NURO確認を画面内で開く</button>

<a href="https://order.sso.biglobe.ne.jp/fixed/hikari/check-area/1" target="_blank">
<button>BIGLOBEを別タブで開く</button>
</a>

<a href="https://nuro.jp/area/area_search/index_a.html" target="_blank">
<button>NUROを別タブで開く</button>
</a>

</div>

<div class="card">
<h2>公式確認画面</h2>
<p>※公式サイト側が埋め込みを禁止している場合、この枠内には表示されません。その場合は「別タブで開く」を使ってください。</p>

<iframe id="officialFrame" src=""></iframe>
</div>

<div class="card">
<h2>確認結果を保存</h2>

<div class="grid">
<select id="biglobe1g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
</select>

<select id="biglobe10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
</select>

<select id="nuro2g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
</select>

<select id="nuro10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
</select>

<input id="checkDate" type="date">
<input id="memo" placeholder="メモ">
</div>

<button class="save" onclick="saveAreaResult()">判定DBに保存</button>
</div>

<div class="card">
<h2>判定DB一覧</h2>

<table>
<thead>
<tr>
<th>名前</th>
<th>電話番号</th>
<th>郵便番号</th>
<th>住所</th>
<th>BIGLOBE 1G</th>
<th>BIGLOBE 10G</th>
<th>NURO 2G</th>
<th>NURO 10G</th>
<th>確認日</th>
<th>メモ</th>
<th>操作</th>
</tr>
</thead>
<tbody id="areaTable"></tbody>
</table>
</div>

<script>
let areaDB = JSON.parse(localStorage.getItem("areaDB")) || [];

function openBiglobe(){
  document.getElementById("officialFrame").src =
    "https://order.sso.biglobe.ne.jp/fixed/hikari/check-area/1";
}

function openNuro(){
  document.getElementById("officialFrame").src =
    "https://nuro.jp/area/area_search/index_a.html";
}

function cleanZip(zip){
  return String(zip || "").replace(/[^0-9]/g,"");
}

function saveAreaResult(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const zipcode = cleanZip(document.getElementById("zipcode").value);
  const address = document.getElementById("address").value;

  const biglobe1g = document.getElementById("biglobe1g").value;
  const biglobe10g = document.getElementById("biglobe10g").value;
  const nuro2g = document.getElementById("nuro2g").value;
  const nuro10g = document.getElementById("nuro10g").value;
  const checkDate = document.getElementById("checkDate").value;
  const memo = document.getElementById("memo").value;

  if(!zipcode){
    alert("郵便番号を入力してください");
    return;
  }

  const data = {
    name,
    phone,
    zipcode,
    address,
    biglobe1g,
    biglobe10g,
    nuro2g,
    nuro10g,
    checkDate,
    memo
  };

  const index = areaDB.findIndex(item => item.zipcode === zipcode);

  if(index >= 0){
    areaDB[index] = data;
  }else{
    areaDB.push(data);
  }

  localStorage.setItem("areaDB", JSON.stringify(areaDB));
  renderAreaDB();

  alert("判定DBに保存しました");
}

function renderAreaDB(){
  const tbody = document.getElementById("areaTable");
  tbody.innerHTML = "";

  areaDB.forEach((item,index)=>{
    tbody.innerHTML += `
      <tr>
        <td>${item.name || ""}</td>
        <td>${item.phone || ""}</td>
        <td>${item.zipcode || ""}</td>
        <td>${item.address || ""}</td>
        <td>${item.biglobe1g || ""}</td>
        <td>${item.biglobe10g || ""}</td>
        <td>${item.nuro2g || ""}</td>
        <td>${item.nuro10g || ""}</td>
        <td>${item.checkDate || ""}</td>
        <td>${item.memo || ""}</td>
        <td><button onclick="deleteArea(${index})">削除</button></td>
      </tr>
    `;
  });
}

function deleteArea(index){
  if(confirm("削除しますか？")){
    areaDB.splice(index,1);
    localStorage.setItem("areaDB", JSON.stringify(areaDB));
    renderAreaDB();
  }
}

renderAreaDB();
</script>

</body>
</html>
