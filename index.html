<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光回線 顧客管理ツール</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

input,select{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:4px;
}

.add{
  background:#0070f3;
  color:white;
}

.update{
  background:#f59e0b;
  color:white;
}

.csv{
  background:#16a34a;
  color:white;
}

.import{
  background:#9333ea;
  color:white;
}

.delete{
  background:#ef4444;
  color:white;
}

.check{
  background:#2563eb;
  color:white;
}

.logout{
  background:#111827;
  color:white;
  float:right;
}

.clear{
  background:#6b7280;
  color:white;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  font-size:13px;
  text-align:left;
  vertical-align:top;
}

th{
  background:#eee;
}

.warning{
  color:#dc2626;
  font-weight:bold;
}

.success{
  color:#16a34a;
  font-weight:bold;
}

.login-box{
  max-width:400px;
  margin:80px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.hidden{
  display:none;
}

a{
  color:#2563eb;
  text-decoration:none;
}

</style>
</head>

<body>

<div id="loginScreen" class="login-box">

<h1>ログイン</h1>

<input id="loginId" placeholder="メールアドレス">

<br><br>

<input id="loginPass" type="password" placeholder="パスワード">

<br><br>

<button class="add" onclick="login()">
ログイン
</button>

<p id="loginError" class="warning"></p>

</div>

<div id="appScreen" class="hidden">

<button class="logout" onclick="logout()">
ログアウト
</button>

<h1>光回線 顧客管理ツール</h1>

<div class="card">

<h2>顧客登録・編集</h2>

<input type="hidden" id="editingId">

<div class="grid">

<input id="name" placeholder="お客様名（漢字）">

<input id="name_kana" placeholder="お客様名（カナ）">

<input id="mobile_phone" placeholder="連絡先">

<input id="home_phone" placeholder="固定電話番号">

<input id="birthday" type="date">

<input id="zipcode" placeholder="郵便番号" oninput="handleZipInput()">

<input id="address" placeholder="住所">

<input id="open_date" type="date">

<input id="staff" placeholder="担当者名">

<select id="status">
<option>未対応</option>
<option>LINE対応中</option>
<option>架電予定</option>
<option>成約</option>
<option>失注</option>
</select>

<select id="rank">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<select id="biglobe_10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
<option>◎ 10G濃厚</option>
<option>○ 10G候補</option>
</select>

<select id="nuro_2g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
<option>○ NURO候補</option>
</select>

<select id="nuro_10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
<option>◎ NURO10G濃厚</option>
<option>○ NURO10G候補</option>
</select>

<select id="ntt_area">
<option>東日本</option>
<option>西日本</option>
</select>

<select id="ntt_10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
<option>◎ 10G濃厚</option>
<option>○ 10G候補</option>
</select>

<input id="check_date" type="date">

<input id="area_memo" placeholder="エリア判定メモ">

<input id="memo" placeholder="顧客メモ">

</div>

<p id="duplicateWarning" class="warning"></p>

<p id="areaDbMessage" class="success"></p>

<button class="add" onclick="saveCustomer()">
新規保存
</button>

<button class="update" onclick="updateCustomer()">
更新保存
</button>

<button class="clear" onclick="clearInputs()">
入力クリア
</button>

<button class="csv" onclick="exportCSV()">
CSV出力
</button>

<input type="file" id="csvFile" accept=".csv">

<button class="import" onclick="bulkImportCustomers()">
CSVインポート
</button>

<p>

<a href="https://order.sso.biglobe.ne.jp/fixed/hikari/check-area/init?hikariarea=top" target="_blank">
<button class="check">BIGLOBE確認</button>
</a>

<a href="https://nuro.jp/area/area_search/index_a.html" target="_blank">
<button class="check">NURO確認</button>
</a>

<a href="https://flets.com/flets-hikari/application/sim/" target="_blank">
<button class="check">NTT東日本確認</button>
</a>

<a href="https://flets.ntt-west.co.jp/area/areaSearch" target="_blank">
<button class="check">NTT西日本確認</button>
</a>

</p>

</div>

<div class="card">

<h2>検索・一覧</h2>

<input
id="search"
placeholder="検索"
oninput="currentPage=1; renderTable()"
>

<p id="summary">件数：0件</p>

<div>

<button class="check" onclick="showTodayCallList()">
今日架電すべき顧客
</button>

<button class="clear" onclick="clearTodayCallFilter()">
全件表示に戻す
</button>

</div>

<br>

<div>

<button class="check" onclick="prevPage()">
前へ
</button>

<span id="pageInfo">
1 / 1
</span>

<button class="check" onclick="nextPage()">
次へ
</button>

</div>

<br>

<table>

<thead>

<tr>

<th>名前</th>
<th>カナ</th>
<th>連絡先</th>
<th>固定電話</th>
<th>生年月日</th>
<th>郵便番号</th>
<th>住所</th>
<th>開通日</th>
<th>架電時期</th>
<th>スコア</th>
<th>優先度</th>
<th>BIGLOBE10G</th>
<th>NURO2G</th>
<th>NURO10G</th>
<th>NTT東西</th>
<th>NTT10G</th>
<th>対応</th>
<th>ランク</th>
<th>メモ</th>
<th>操作</th>

</tr>

</thead>

<tbody id="customerTable"></tbody>

</table>

</div>

</div>

<script>

const supabaseUrl =
"https://diwaikaobyvxltqakilv.supabase.co";

const supabaseKey =
"sb_publishable_k5cj6-sQ7bV0CGV24_Hgcw_eld_RV2u";

const supabaseClient =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);

let customers = [];

let currentPage = 1;

const pageSize = 100;

let todayCallOnly = false;

async function login(){

  const email =
    document.getElementById("loginId").value.trim();

  const password =
    document.getElementById("loginPass").value;

  const { error } =
    await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

  if(error){

    document.getElementById("loginError").innerText =
      "ログイン失敗：" + error.message;

    return;
  }

  showApp();

  loadCustomers();
}

async function logout(){

  await supabaseClient.auth.signOut();

  location.reload();
}

function showApp(){

  document.getElementById("loginScreen")
    .classList.add("hidden");

  document.getElementById("appScreen")
    .classList.remove("hidden");
}

async function checkLogin(){

  const { data } =
    await supabaseClient.auth.getSession();

  if(data.session){

    showApp();

    loadCustomers();
  }
}

checkLogin();

async function loadCustomers(){

  let allData = [];

  let from = 0;

  const step = 1000;

  while(true){

    const { data, error } =
      await supabaseClient
        .from("customers")
        .select("*")
        .order("created_at",{ascending:false})
        .range(from, from + step - 1);

    if(error){

      alert("読み込みエラー：" + error.message);

      return;
    }

    if(!data || data.length === 0){

      break;
    }

    allData = allData.concat(data);

    if(data.length < step){

      break;
    }

    from += step;
  }

  customers = allData;

  currentPage = 1;

  renderTable();
}

function cleanZip(zip){

  const v =
    String(zip || "")
      .replace(/[^0-9]/g,"");

  if(!v)
    return "";

  return v
    .padStart(7,"0")
    .slice(-7);
}

function detectCarrier(phone){

  const num =
    String(phone || "")
      .replace(/[^0-9]/g,"");

  if(num.startsWith("070"))
    return "楽天/格安SIM系";

  if(num.startsWith("080"))
    return "大手/格安SIM系";

  if(num.startsWith("090"))
    return "大手キャリア系";

  return "不明";
}

function detectNttArea(address){

  const west = [
    "大阪府",
    "京都府",
    "兵庫県",
    "福岡県",
    "愛知県"
  ];

  return west.some(p =>
    address.includes(p)
  )
    ? "西日本"
    : "東日本";
}

function judge10G(address){

  const strong = [
    "東京都",
    "大阪市",
    "横浜市",
    "名古屋市",
    "福岡市"
  ];

  if(strong.some(a =>
    address.includes(a)
  )){
    return "◎ 10G濃厚";
  }

  return "○ 10G候補";
}

function judgeNuro2G(address){

  const list = [
    "東京都",
    "神奈川県",
    "埼玉県",
    "千葉県",
    "大阪府",
    "愛知県"
  ];

  return list.some(a =>
    address.includes(a)
  )
    ? "○ NURO候補"
    : "要確認";
}

function judgeNuro10G(address){

  const list = [
    "東京都",
    "神奈川県",
    "大阪市",
    "名古屋市"
  ];

  return list.some(a =>
    address.includes(a)
  )
    ? "○ NURO10G候補"
    : "要確認";
}

function getCallTiming(openDate){

  if(!openDate)
    return "要確認";

  const d =
    new Date(openDate);

  const now =
    new Date();

  const months =
    (now.getFullYear()-d.getFullYear())*12
    + now.getMonth()
    - d.getMonth();

  if(months >= 24)
    return "今すぐ架電";

  if(months >= 18)
    return "優先架電";

  if(months >= 12)
    return "確認候補";

  return "まだ早い";
}

function getScore(c){

  let score = 0;

  const text = [
    c.biglobe_10g,
    c.nuro_2g,
    c.nuro_10g,
    c.ntt_10g
  ].join(" ");

  if(text.includes("◎"))
    score += 40;

  if(text.includes("○"))
    score += 25;

  if(getCallTiming(c.open_date)
      === "今すぐ架電")
    score += 25;

  if(getCallTiming(c.open_date)
      === "優先架電")
    score += 15;

  if(c.rank === "A")
    score += 20;

  if(c.status === "成約"
    || c.status === "失注")
    score -= 50;

  return score;
}

function getPriority(c){

  const score =
    getScore(c);

  if(score >= 70)
    return "S 最優先";

  if(score >= 50)
    return "A 優先";

  if(score >= 30)
    return "B 通常";

  return "C 低";
}

function isTodayCallTarget(c){

  const timing =
    getCallTiming(c.open_date);

  const priority =
    getPriority(c);

  const notClosed =
    c.status !== "成約"
    &&
    c.status !== "失注";

  const timingGood =
    timing === "今すぐ架電"
    ||
    timing === "優先架電";

  const priorityGood =
    priority.startsWith("S")
    ||
    priority.startsWith("A")
    ||
    priority.startsWith("B");

  return notClosed
    && timingGood
    && priorityGood;
}

async function handleZipInput(){

  const zip =
    cleanZip(
      document.getElementById("zipcode").value
    );

  if(zip.length !== 7)
    return;

  const addr =
    await getAddressFromZip(zip);

  if(addr
    &&
    !document.getElementById("address").value){

    document.getElementById("address").value =
      addr;
  }

  const address =
    document.getElementById("address").value;

  document.getElementById("ntt_area").value =
    detectNttArea(address);

  document.getElementById("biglobe_10g").value =
    judge10G(address);

  document.getElementById("ntt_10g").value =
    judge10G(address);

  document.getElementById("nuro_2g").value =
    judgeNuro2G(address);

  document.getElementById("nuro_10g").value =
    judgeNuro10G(address);
}

async function getAddressFromZip(zip){

  try{

    const res =
      await fetch(
        `https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zip}`
      );

    const json =
      await res.json();

    if(json.results
      &&
      json.results.length > 0){

      const a =
        json.results[0];

      return a.address1
        + a.address2
        + a.address3;
    }

  }catch(e){}

  return "";
}

function getFormData(){

  const mobile =
    document.getElementById("mobile_phone").value;

  const address =
    document.getElementById("address").value;

  return {

    name:
      document.getElementById("name").value,

    name_kana:
      document.getElementById("name_kana").value,

    mobile_phone:
      mobile,

    home_phone:
      document.getElementById("home_phone").value,

    birthday:
      document.getElementById("birthday").value || null,

    carrier:
      detectCarrier(mobile),

    zipcode:
      cleanZip(
        document.getElementById("zipcode").value
      ),

    address:
      address,

    open_date:
      document.getElementById("open_date").value || null,

    staff:
      document.getElementById("staff").value,

    status:
      document.getElementById("status").value,

    rank:
      document.getElementById("rank").value,

    biglobe_10g:
      document.getElementById("biglobe_10g").value,

    nuro_2g:
      document.getElementById("nuro_2g").value,

    nuro_10g:
      document.getElementById("nuro_10g").value,

    ntt_area:
      document.getElementById("ntt_area").value,

    ntt_10g:
      document.getElementById("ntt_10g").value,

    check_date:
      document.getElementById("check_date").value || null,

    area_memo:
      document.getElementById("area_memo").value,

    memo:
      document.getElementById("memo").value
  };
}

function getFilteredCustomers(){

  const keyword =
    document.getElementById("search").value || "";

  let filtered =
    customers.filter(c =>

      (c.name || "")
        .includes(keyword)

      ||

      (c.name_kana || "")
        .includes(keyword)

      ||

      (c.mobile_phone || "")
        .includes(keyword)

      ||

      (c.home_phone || "")
        .includes(keyword)

      ||

      (c.zipcode || "")
        .includes(keyword)

      ||

      (c.address || "")
        .includes(keyword)
    );

  if(todayCallOnly){

    filtered =
      filtered.filter(c =>
        isTodayCallTarget(c)
      );
  }

  return filtered;
}

function renderTable(){

  const tbody =
    document.getElementById("customerTable");

  tbody.innerHTML = "";

  const filtered =
    getFilteredCustomers();

  const totalPages =
    Math.max(
      1,
      Math.ceil(filtered.length / pageSize)
    );

  if(currentPage > totalPages){

    currentPage = totalPages;
  }

  const start =
    (currentPage - 1) * pageSize;

  const end =
    start + pageSize;

  const pageItems =
    filtered.slice(start,end);

  pageItems.forEach(c=>{

    tbody.innerHTML += `
<tr>

<td>${c.name || ""}</td>
<td>${c.name_kana || ""}</td>
<td>${c.mobile_phone || ""}</td>
<td>${c.home_phone || ""}</td>
<td>${c.birthday || ""}</td>
<td>${c.zipcode || ""}</td>
<td>${c.address || ""}</td>
<td>${c.open_date || ""}</td>
<td>${getCallTiming(c.open_date)}</td>
<td>${getScore(c)}</td>
<td>${getPriority(c)}</td>
<td>${c.biglobe_10g || ""}</td>
<td>${c.nuro_2g || ""}</td>
<td>${c.nuro_10g || ""}</td>
<td>${c.ntt_area || ""}</td>
<td>${c.ntt_10g || ""}</td>
<td>${c.status || ""}</td>
<td>${c.rank || ""}</td>
<td>${c.memo || ""}</td>

<td>

<button
class="check"
onclick="editCustomer(${c.id})">
編集
</button>

<br>

<button
class="delete"
onclick="deleteCustomer(${c.id})">
削除
</button>

</td>

</tr>
`;
  });

  document.getElementById("summary").innerText =
    `件数：${customers.length}件 / 検索結果：${filtered.length}件 / 表示：${pageItems.length}件`;

  document.getElementById("pageInfo").innerText =
    `${currentPage} / ${totalPages}`;
}

function nextPage(){

  const filtered =
    getFilteredCustomers();

  const totalPages =
    Math.max(
      1,
      Math.ceil(filtered.length / pageSize)
    );

  if(currentPage < totalPages){

    currentPage++;

    renderTable();
  }
}

function prevPage(){

  if(currentPage > 1){

    currentPage--;

    renderTable();
  }
}

function showTodayCallList(){

  todayCallOnly = true;

  currentPage = 1;

  renderTable();
}

function clearTodayCallFilter(){

  todayCallOnly = false;

  currentPage = 1;

  renderTable();
}

</script>

</body>
</html>
