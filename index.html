<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>光回線 営業管理ツール</title>

<style>

body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    margin-bottom:30px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap:15px;
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.add-btn{
    background:#0070f3;
    color:white;
}

.csv-btn{
    background:#16a34a;
    color:white;
    margin-left:10px;
}

.delete-btn{
    background:#ef4444;
    color:white;
}

.memo-btn{
    background:#9333ea;
    color:white;
}

.call-btn{
    background:#f59e0b;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
}

th, td{
    border:1px solid #ddd;
    padding:12px;
    text-align:left;
    vertical-align:top;
}

th{
    background:#f0f0f0;
}

.status{
    padding:6px 12px;
    border-radius:20px;
    color:white;
    font-weight:bold;
    display:inline-block;
}

.status-wait{
    background:#6b7280;
}

.status-line{
    background:#3b82f6;
}

.status-call{
    background:#f59e0b;
}

.status-close{
    background:#16a34a;
}

.memo-box{
    white-space:pre-wrap;
    font-size:14px;
}

a{
    color:#2563eb;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

.search-box{
    margin-top:15px;
}

</style>
</head>

<body>

<h1>光回線 営業管理ツール</h1>

<div class="card">

<h2>顧客登録</h2>

<div class="grid">

<input id="name" placeholder="名前">

<input id="phone" placeholder="電話番号">

<input id="zipcode" placeholder="郵便番号">

<input id="address" placeholder="住所">

</div>

<div class="grid">

<select id="status">
<option>未対応</option>
<option>LINE対応中</option>
<option>架電予定</option>
<option>成約</option>
</select>

<input id="search" placeholder="顧客検索">

</div>

<button class="add-btn" onclick="addCustomer()">
リストに追加
</button>

<button class="csv-btn" onclick="downloadCSV()">
CSV出力
</button>

</div>

<div class="card">

<h2>顧客リスト</h2>

<table>

<thead>

<tr>

<th>名前</th>
<th>電話番号</th>
<th>郵便番号</th>
<th>推定キャリア</th>
<th>住所</th>
<th>NTT回線</th>
<th>NURO光</th>
<th>NURO種別</th>
<th>提案候補</th>
<th>対応状況</th>
<th>LINEメモ</th>
<th>架電履歴</th>
<th>公式確認</th>
<th>地図</th>
<th>操作</th>

</tr>

</thead>

<tbody id="customerTable"></tbody>

</table>

</div>

<script>

let customers = JSON.parse(localStorage.getItem("customers")) || [];

function saveCustomers(){
    localStorage.setItem("customers", JSON.stringify(customers));
}

document.getElementById("search").addEventListener("input", renderTable);

function detectCarrier(phone){

    if(phone.startsWith("090") || phone.startsWith("080")){
        return "大手キャリア系";
    }

    if(phone.startsWith("070")){
        return "楽天/格安SIM系";
    }

    return "不明";
}

function checkNTT(address){

    if(address.includes("札幌")){
        return "利用可能性高";
    }

    return "要確認";
}

function checkNuro(zipcode, address){

    const zip = zipcode.replace(/[^0-9]/g, "");

    if(
        zip === "0640805" ||
        address.includes("札幌市中央区南5条西8丁目")
    ){
        return "提供中";
    }

    if(
        address.includes("札幌市東区北48") ||
        address.includes("札幌市東区北四十八")
    ){
        return "未提供";
    }

    if(address.includes("北海道")){
        return "要公式確認";
    }

    return "要確認";
}

function detectNuroType(zipcode, address){

    const zip = zipcode.replace(/[^0-9]/g, "");

    if(
        zip === "0640805" ||
        address.includes("札幌市中央区南5条西8丁目")
    ){
        return "2G / 10G提供中";
    }

    if(
        address.includes("札幌市東区北48") ||
        address.includes("札幌市東区北四十八")
    ){
        return "2G/10G未提供";
    }

    return "要確認";
}

function suggestPlan(nuro){

    if(nuro === "提供中"){
        return "NURO優先提案";
    }

    if(nuro === "未提供"){
        return "フレッツ/光コラボ提案";
    }

    return "ヒアリング優先";
}

function getStatusClass(status){

    if(status === "未対応"){
        return "status status-wait";
    }

    if(status === "LINE対応中"){
        return "status status-line";
    }

    if(status === "架電予定"){
        return "status status-call";
    }

    if(status === "成約"){
        return "status status-close";
    }

    return "status";
}

function addCustomer(){

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const zipcode = document.getElementById("zipcode").value;
    const address = document.getElementById("address").value;
    const status = document.getElementById("status").value;

    const carrier = detectCarrier(phone);
    const ntt = checkNTT(address);
    const nuro = checkNuro(zipcode, address);
    const nuroType = detectNuroType(zipcode, address);
    const suggest = suggestPlan(nuro);

    const customer = {

        name,
        phone,
        zipcode,
        carrier,
        address,
        ntt,
        nuro,
        nuroType,
        suggest,
        status,
        memo:"",
        call:""

    };

    customers.push(customer);

    saveCustomers();

    renderTable();

    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("zipcode").value = "";
    document.getElementById("address").value = "";
}

function renderTable(){

    const keyword = document.getElementById("search").value;

    const table = document.getElementById("customerTable");

    table.innerHTML = "";

    customers
    .filter(c =>
        c.name.includes(keyword) ||
        c.phone.includes(keyword) ||
        c.address.includes(keyword)
    )
    .forEach((c,index)=>{

        table.innerHTML += `

        <tr>

        <td>${c.name}</td>

        <td>${c.phone}</td>

        <td>${c.zipcode}</td>

        <td>${c.carrier}</td>

        <td>${c.address}</td>

        <td>${c.ntt}</td>

        <td>${c.nuro}</td>

        <td>${c.nuroType}</td>

        <td>${c.suggest}</td>

        <td>

        <div class="${getStatusClass(c.status)}">
        ${c.status}
        </div>

        </td>

        <td class="memo-box">

        ${c.memo}

        <br><br>

        <button class="memo-btn" onclick="editMemo(${index})">
        編集
        </button>

        </td>

        <td class="memo-box">

        ${c.call}

        <br><br>

        <button class="call-btn" onclick="editCall(${index})">
        編集
        </button>

        </td>

        <td>

        <a href="https://flets.com/" target="_blank">
        NTT確認
        </a>

        <br><br>

        <a href="https://nuro.jp/area/area_search/index_a.html" target="_blank">
        NURO確認
        </a>

        </td>

        <td>

        <a href="https://www.google.com/maps/search/${encodeURIComponent(c.address)}" target="_blank">
        地図
        </a>

        </td>

        <td>

        <button class="delete-btn" onclick="deleteCustomer(${index})">
        削除
        </button>

        </td>

        </tr>

        `;
    });
}

function deleteCustomer(index){

    if(confirm("削除しますか？")){

        customers.splice(index,1);

        saveCustomers();

        renderTable();
    }
}

function editMemo(index){

    const memo = prompt("LINEメモ入力", customers[index].memo);

    if(memo !== null){

        customers[index].memo = memo;

        saveCustomers();

        renderTable();
    }
}

function editCall(index){

    const call = prompt("架電履歴入力", customers[index].call);

    if(call !== null){

        customers[index].call = call;

        saveCustomers();

        renderTable();
    }
}

function downloadCSV(){

    let csv = "名前,電話番号,郵便番号,キャリア,住所,NTT,NURO,NURO種別,提案候補,対応状況\n";

    customers.forEach(c=>{

        csv += `${c.name},${c.phone},${c.zipcode},${c.carrier},${c.address},${c.ntt},${c.nuro},${c.nuroType},${c.suggest},${c.status}\n`;

    });

    const blob = new Blob([csv], {type:"text/csv"});

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;

    a.download = "customers.csv";

    a.click();
}

renderTable();

</script>

</body>
</html>
