<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光回線 営業管理ツール</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0;padding:20px;}
.card{background:white;padding:25px;border-radius:12px;margin-bottom:30px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:15px;}
input,select{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:15px;box-sizing:border-box;}
button{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;font-size:15px;margin-right:6px;}
.add-btn{background:#0070f3;color:white;}
.csv-btn{background:#16a34a;color:white;}
.import-btn{background:#9333ea;color:white;}
.delete-btn{background:#ef4444;color:white;}
table{width:100%;border-collapse:collapse;background:white;margin-top:20px;}
th,td{border:1px solid #ddd;padding:10px;font-size:14px;text-align:left;vertical-align:top;}
th{background:#f0f0f0;}
.status{padding:6px 12px;border-radius:20px;color:white;font-weight:bold;display:inline-block;}
.rankA{background:#16a34a;}
.rankB{background:#f59e0b;}
.rankC{background:#ef4444;}
.status-wait{background:#6b7280;}
.status-line{background:#3b82f6;}
.status-call{background:#f59e0b;}
.status-close{background:#16a34a;}
a{color:#2563eb;text-decoration:none;}
a:hover{text-decoration:underline;}
</style>
</head>

<body>

<h1>光回線 営業管理ツール</h1>

<div class="card">
<h2>顧客登録</h2>

<div class="grid">
<input id="name" placeholder="名前">
<input id="phone" placeholder="電話番号">
<input id="zipcode" placeholder="郵便番号">
<input id="address" placeholder="住所">

<input id="staff" placeholder="担当者名">

<select id="status">
<option>未対応</option>
<option>LINE対応中</option>
<option>架電予定</option>
<option>成約</option>
</select>

<select id="rank">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<input id="productMemo" placeholder="商材別メモ">

<input id="lastContactDate" type="date">
<input id="nextContactDate" type="date">

<select id="biglobe1g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
</select>

<select id="biglobe10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
</select>

<input id="biglobeCheckDate" type="date">
</div>

<button class="add-btn" onclick="addCustomer()">リストに追加</button>
<button class="csv-btn" onclick="downloadCSV()">CSV出力</button>
<button class="import-btn" onclick="document.getElementById('csvFile').click()">CSVインポート</button>

<input type="file" id="csvFile" accept=".csv" style="display:none">
</div>

<div class="card">
<h2>検索・集計</h2>
<p id="monthlySummary">今月成約数：0件</p>
<input id="search" placeholder="検索" style="width:300px;padding:10px;">
</div>

<div class="card">
<h2>顧客リスト</h2>

<table>
<thead>
<tr>
<th>名前</th>
<th>電話番号</th>
<th>郵便番号</th>
<th>推定キャリア</th>
<th>住所</th>
<th>担当者</th>
<th>NTT</th>
<th>NURO</th>
<th>NURO種別</th>
<th>BIGLOBE 1G</th>
<th>BIGLOBE 10G</th>
<th>確認日</th>
<th>提案候補</th>
<th>対応状況</th>
<th>ランク</th>
<th>最終対応日</th>
<th>次回連絡日</th>
<th>商材メモ</th>
<th>公式確認</th>
<th>地図</th>
<th>操作</th>
</tr>
</thead>

<tbody id="customerTable"></tbody>
</table>
</div>

<script>
let customers = JSON.parse(localStorage.getItem("customers")) || [];

function saveCustomers(){
  localStorage.setItem("customers", JSON.stringify(customers));
}

document.getElementById("search").addEventListener("input", renderTable);

function detectCarrier(phone){
  const num = phone.replace(/[^0-9]/g,"");

  if(num.startsWith("090") || num.startsWith("080")){
    return "大手キャリア系";
  }

  if(num.startsWith("070")){
    return "楽天/格安SIM系";
  }

  return "不明";
}

function checkNTT(address){
  if(address.includes("札幌")){
    return "利用可能性高";
  }
  return "要確認";
}

function checkNuro(zipcode,address){
  const zip = zipcode.replace(/[^0-9]/g,"");

  if(zip === "0640805" || address.includes("札幌市中央区南5条西8丁目")){
    return "提供中";
  }

  if(address.includes("札幌市東区北48")){
    return "未提供";
  }

  return "要確認";
}

function detectNuroType(zipcode,address){
  const zip = zipcode.replace(/[^0-9]/g,"");

  if(zip === "0640805"){
    return "2G / 10G提供中";
  }

  if(address.includes("札幌市東区北48")){
    return "2G/10G未提供";
  }

  return "要確認";
}

function suggestPlan(nuro,biglobe1g,biglobe10g){
  if(biglobe10g === "提供中"){
    return "BIGLOBE 10G / ドコモ光10G提案";
  }

  if(biglobe1g === "提供中"){
    return "BIGLOBE 1G / 光コラボ提案";
  }

  if(nuro === "提供中"){
    return "NURO優先";
  }

  if(nuro === "未提供"){
    return "フレッツ/光コラボ確認";
  }

  return "ヒアリング優先";
}

function addCustomer(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const zipcode = document.getElementById("zipcode").value;
  const address = document.getElementById("address").value;
  const staff = document.getElementById("staff").value;
  const status = document.getElementById("status").value;
  const rank = document.getElementById("rank").value;
  const productMemo = document.getElementById("productMemo").value;
  const lastContactDate = document.getElementById("lastContactDate").value;
  const nextContactDate = document.getElementById("nextContactDate").value;
  const biglobe1g = document.getElementById("biglobe1g").value;
  const biglobe10g = document.getElementById("biglobe10g").value;
  const biglobeCheckDate = document.getElementById("biglobeCheckDate").value;

  const carrier = detectCarrier(phone);
  const ntt = checkNTT(address);
  const nuro = checkNuro(zipcode,address);
  const nuroType = detectNuroType(zipcode,address);
  const suggest = suggestPlan(nuro,biglobe1g,biglobe10g);

  customers.push({
    name,phone,zipcode,carrier,address,staff,ntt,nuro,nuroType,
    biglobe1g,biglobe10g,biglobeCheckDate,
    suggest,status,rank,lastContactDate,nextContactDate,productMemo
  });

  saveCustomers();
  renderTable();
  clearInputs();
}

function clearInputs(){
  document.querySelectorAll("input").forEach(input=>{
    if(input.type !== "file"){
      input.value = "";
    }
  });
}

function renderTable(){
  const keyword = document.getElementById("search").value;
  const table = document.getElementById("customerTable");

  table.innerHTML = "";

  let monthlyClose = 0;

  customers
  .filter(c =>
    (c.name || "").includes(keyword) ||
    (c.phone || "").includes(keyword) ||
    (c.zipcode || "").includes(keyword) ||
    (c.address || "").includes(keyword) ||
    (c.staff || "").includes(keyword) ||
    (c.status || "").includes(keyword)
  )
  .forEach((c,index)=>{

    if(c.status === "成約"){
      monthlyClose++;
    }

    table.innerHTML += `
    <tr>
      <td>${c.name || ""}</td>
      <td>${c.phone || ""}</td>
      <td>${c.zipcode || ""}</td>
      <td>${c.carrier || ""}</td>
      <td>${c.address || ""}</td>
      <td>${c.staff || ""}</td>
      <td>${c.ntt || ""}</td>
      <td>${c.nuro || ""}</td>
      <td>${c.nuroType || ""}</td>
      <td>${c.biglobe1g || "要確認"}</td>
      <td>${c.biglobe10g || "要確認"}</td>
      <td>${c.biglobeCheckDate || ""}</td>
      <td>${c.suggest || ""}</td>

      <td>
        <span class="status ${getStatusClass(c.status)}">${c.status || ""}</span>
      </td>

      <td>
        <span class="status ${getRankClass(c.rank)}">${c.rank || ""}</span>
      </td>

      <td>${c.lastContactDate || ""}</td>
      <td>${c.nextContactDate || ""}</td>
      <td>${c.productMemo || ""}</td>

      <td>
        <a href="https://order.sso.biglobe.ne.jp/fixed/hikari/check-area/1" target="_blank">
          BIGLOBE確認
        </a>
        <br><br>
        <a href="https://flets.com/" target="_blank">
          NTT確認
        </a>
        <br><br>
        <a href="https://nuro.jp/area/area_search/index_a.html" target="_blank">
          NURO確認
        </a>
      </td>

      <td>
        <a href="https://www.google.com/maps/search/${encodeURIComponent(c.address || "")}" target="_blank">
          地図
        </a>
      </td>

      <td>
        <button class="delete-btn" onclick="deleteCustomer(${index})">削除</button>
      </td>
    </tr>
    `;
  });

  document.getElementById("monthlySummary").innerText =
    "今月成約数：" + monthlyClose + "件";
}

function getStatusClass(status){
  if(status === "未対応") return "status-wait";
  if(status === "LINE対応中") return "status-line";
  if(status === "架電予定") return "status-call";
  if(status === "成約") return "status-close";
  return "";
}

function getRankClass(rank){
  if(rank === "A") return "rankA";
  if(rank === "B") return "rankB";
  return "rankC";
}

function deleteCustomer(index){
  if(confirm("削除しますか？")){
    customers.splice(index,1);
    saveCustomers();
    renderTable();
  }
}

function downloadCSV(){
  let csv =
  "名前,電話番号,郵便番号,キャリア,住所,担当者,NTT,NURO,NURO種別,BIGLOBE1G,BIGLOBE10G,BIGLOBE確認日,提案候補,対応状況,ランク,最終対応日,次回連絡日,商材メモ\n";

  customers.forEach(c=>{
    csv +=
    `"${c.name || ""}","${c.phone || ""}","${c.zipcode || ""}","${c.carrier || ""}","${c.address || ""}","${c.staff || ""}","${c.ntt || ""}","${c.nuro || ""}","${c.nuroType || ""}","${c.biglobe1g || ""}","${c.biglobe10g || ""}","${c.biglobeCheckDate || ""}","${c.suggest || ""}","${c.status || ""}","${c.rank || ""}","${c.lastContactDate || ""}","${c.nextContactDate || ""}","${c.productMemo || ""}"\n`;
  });

  const blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "customers.csv";
  a.click();
}

document.getElementById("csvFile").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){
    const text = event.target.result;
    const rows = text.split("\n");

    rows.slice(1).forEach(row=>{
      const cols = row.split(",");

      if(cols.length > 5){
        customers.push({
          name: cols[0] || "",
          phone: cols[1] || "",
          zipcode: cols[2] || "",
          carrier: cols[3] || "",
          address: cols[4] || "",
          staff: cols[5] || "",
          ntt: cols[6] || "",
          nuro: cols[7] || "",
          nuroType: cols[8] || "",
          biglobe1g: cols[9] || "要確認",
          biglobe10g: cols[10] || "要確認",
          biglobeCheckDate: cols[11] || "",
          suggest: cols[12] || "",
          status: cols[13] || "",
          rank: cols[14] || "",
          lastContactDate: cols[15] || "",
          nextContactDate: cols[16] || "",
          productMemo: cols[17] || ""
        });
      }
    });

    saveCustomers();
    renderTable();
  };

  reader.readAsText(file);
});

renderTable();
</script>

</body>
</html>
