<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>光回線 顧客管理ツール 完全版</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:12px;
}

input,select{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:4px;
}

.add{background:#0070f3;color:white;}
.update{background:#f59e0b;color:white;}
.csv{background:#16a34a;color:white;}
.import{background:#9333ea;color:white;}
.delete{background:#ef4444;color:white;}
.check{background:#2563eb;color:white;}
.logout{background:#111827;color:white;float:right;}
.clear{background:#6b7280;color:white;}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  font-size:13px;
  text-align:left;
  vertical-align:top;
}

th{
  background:#eee;
}

.status{
  padding:6px 10px;
  border-radius:16px;
  color:white;
  font-weight:bold;
  display:inline-block;
}

.wait{background:#6b7280;}
.line{background:#3b82f6;}
.call{background:#f59e0b;}
.close{background:#16a34a;}

.rankA{background:#16a34a;}
.rankB{background:#f59e0b;}
.rankC{background:#ef4444;}

.warning{
  color:#dc2626;
  font-weight:bold;
}

.success{
  color:#16a34a;
  font-weight:bold;
}

.login-box{
  max-width:400px;
  margin:100px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.hidden{
  display:none;
}

a{
  color:#2563eb;
  text-decoration:none;
}

</style>
</head>

<body>

<div id="loginScreen" class="login-box">

<h1>ログイン</h1>

<input id="loginId" placeholder="メールアドレス">

<br><br>

<input id="loginPass" type="password" placeholder="パスワード">

<br><br>

<button class="add" onclick="login()">
ログイン
</button>

<p id="loginError" class="warning"></p>

</div>

<div id="appScreen" class="hidden">

<button class="logout" onclick="logout()">
ログアウト
</button>

<h1>光回線 顧客管理ツール 完全版</h1>

<div class="card">

<h2>顧客登録・編集</h2>

<input type="hidden" id="editingId">

<div class="grid">

<input id="name" placeholder="お客様名（漢字）">

<input id="name_kana" placeholder="お客様名（カナ）">

<input id="mobile_phone" placeholder="連絡先">

<input id="home_phone" placeholder="固定電話番号">

<input id="birthday" type="date">

<input id="zipcode" placeholder="郵便番号" oninput="handleZipInput()">

<input id="address" placeholder="住所">

<input id="open_date" type="date">

<input id="staff" placeholder="担当者名">

<select id="status">
<option>未対応</option>
<option>LINE対応中</option>
<option>架電予定</option>
<option>成約</option>
<option>失注</option>
</select>

<select id="rank">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<select id="biglobe_10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
<option>◎ 10G濃厚</option>
<option>○ 10G候補</option>
</select>

<select id="nuro_2g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
<option>○ NURO候補</option>
</select>

<select id="nuro_10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
<option>◎ NURO10G濃厚</option>
<option>○ NURO10G候補</option>
</select>

<select id="ntt_area">
<option>東日本</option>
<option>西日本</option>
</select>

<select id="ntt_10g">
<option>要確認</option>
<option>提供中</option>
<option>未提供</option>
<option>◎ 10G濃厚</option>
<option>○ 10G候補</option>
</select>

<input id="check_date" type="date">

<input id="area_memo" placeholder="エリア判定メモ">

<input id="memo" placeholder="顧客メモ">

</div>

<p id="duplicateWarning" class="warning"></p>

<p id="areaDbMessage" class="success"></p>

<button class="add" onclick="saveCustomer()">
新規保存
</button>

<button class="update" onclick="updateCustomer()">
更新保存
</button>

<button class="clear" onclick="clearInputs()">
入力クリア
</button>

<button class="csv" onclick="exportCSV()">
CSV出力
</button>

<input type="file" id="csvFile" accept=".csv">

<button class="import" onclick="bulkImportCustomers()">
5000件CSVインポート
</button>

</div>

<div class="card">

<h2>顧客一覧</h2>

<input id="search" placeholder="検索" oninput="renderTable()">

<br><br>

<table>

<thead>

<tr>

<th>名前</th>
<th>カナ</th>
<th>連絡先</th>
<th>固定電話</th>
<th>生年月日</th>
<th>キャリア</th>
<th>郵便番号</th>
<th>住所</th>
<th>開通日</th>
<th>架電時期</th>
<th>スコア</th>
<th>優先度</th>
<th>BIGLOBE10G</th>
<th>NURO2G</th>
<th>NURO10G</th>
<th>NTT東西</th>
<th>NTT10G</th>
<th>対応状況</th>
<th>ランク</th>
<th>メモ</th>
<th>操作</th>

</tr>

</thead>

<tbody id="customerTable"></tbody>

</table>

</div>

</div>

<script>

const supabaseUrl =
"https://YOUR_PROJECT.supabase.co";

const supabaseKey =
"sb_publishable_k5cj6-sQ7bV0CGV24_Hgcw_eld_RV2u";

const supabaseClient =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);

let customers = [];

async function login(){

  const email =
    document.getElementById("loginId").value;

  const password =
    document.getElementById("loginPass").value;

  const { error } =
    await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

  if(error){

    document.getElementById("loginError")
      .innerText =
      "ログイン失敗：" + error.message;

    return;
  }

  showApp();

  loadCustomers();
}

async function logout(){

  await supabaseClient.auth.signOut();

  location.reload();
}

function showApp(){

  loginScreen.classList.add("hidden");

  appScreen.classList.remove("hidden");
}

async function checkLogin(){

  const { data } =
    await supabaseClient.auth.getSession();

  if(data.session){

    showApp();

    loadCustomers();
  }
}

checkLogin();

function cleanZip(zip){

  return String(zip || "")
    .replace(/[^0-9]/g,"")
    .padStart(7,"0")
    .slice(-7);
}

function detectCarrier(phone){

  const num =
    String(phone || "")
      .replace(/[^0-9]/g,"");

  if(num.startsWith("070"))
    return "楽天/格安SIM系";

  if(num.startsWith("080"))
    return "大手/格安SIM系";

  if(num.startsWith("090"))
    return "大手キャリア系";

  return "不明";
}

function detectNttArea(address){

  const west = [
    "大阪府","京都府","兵庫県",
    "奈良県","愛知県","福岡県"
  ];

  return west.some(w => address.includes(w))
    ? "西日本"
    : "東日本";
}

function judge10G(address){

  const strong = [
    "東京都","大阪市","横浜市",
    "名古屋市","福岡市"
  ];

  if(strong.some(a => address.includes(a)))
    return "◎ 10G濃厚";

  return "○ 10G候補";
}

function judgeNuro(address){

  const nuro = [
    "東京都","神奈川県","埼玉県",
    "千葉県","大阪府","愛知県"
  ];

  return nuro.some(a => address.includes(a))
    ? "○ NURO候補"
    : "要確認";
}

function getCallTiming(openDate){

  if(!openDate)
    return "要確認";

  const d = new Date(openDate);

  const now = new Date();

  const months =
    (now.getFullYear() - d.getFullYear()) * 12
    + now.getMonth()
    - d.getMonth();

  if(months >= 24)
    return "今すぐ架電";

  if(months >= 18)
    return "優先架電";

  return "通常";
}

function getScore(c){

  let score = 0;

  if(c.biglobe_10g.includes("◎"))
    score += 40;

  if(c.nuro_10g.includes("◎"))
    score += 40;

  if(c.ntt_10g.includes("◎"))
    score += 30;

  if(getCallTiming(c.open_date)
      === "今すぐ架電")
    score += 20;

  return score;
}

function getPriority(score){

  if(score >= 70)
    return "S 最優先";

  if(score >= 50)
    return "A 優先";

  if(score >= 30)
    return "B 通常";

  return "C 低";
}

async function handleZipInput(){

  const zip =
    cleanZip(zipcode.value);

  if(zip.length !== 7)
    return;

  const addressData =
    await getAddressFromZip(zip);

  if(addressData && !address.value)
    address.value = addressData;

  ntt_area.value =
    detectNttArea(address.value);

  biglobe_10g.value =
    judge10G(address.value);

  nuro_2g.value =
    judgeNuro(address.value);

  nuro_10g.value =
    judgeNuro(address.value);

  ntt_10g.value =
    judge10G(address.value);

  checkDuplicate(zip,address.value);
}

async function getAddressFromZip(zip){

  try{

    const res =
      await fetch(
        `https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zip}`
      );

    const json =
      await res.json();

    if(json.results){

      const a =
        json.results[0];

      return a.address1
        + a.address2
        + a.address3;
    }

  }catch(e){}

  return "";
}

function checkDuplicate(zip,addressText){

  const dup =
    customers.find(c =>
      c.zipcode === zip
      || c.address === addressText
    );

  duplicateWarning.innerText =
    dup
    ? "同一住所・郵便番号あり"
    : "";
}

function getFormData(){

  return {

    name:name.value,

    name_kana:name_kana.value,

    mobile_phone:mobile_phone.value,

    home_phone:home_phone.value,

    birthday:birthday.value || null,

    carrier:
      detectCarrier(
        mobile_phone.value
      ),

    zipcode:
      cleanZip(zipcode.value),

    address:address.value,

    open_date:
      open_date.value || null,

    staff:staff.value,

    status:status.value,

    rank:rank.value,

    biglobe_10g:
      biglobe_10g.value,

    nuro_2g:
      nuro_2g.value,

    nuro_10g:
      nuro_10g.value,

    ntt_area:
      ntt_area.value,

    ntt_10g:
      ntt_10g.value,

    check_date:
      check_date.value || null,

    area_memo:
      area_memo.value,

    memo:
      memo.value
  };
}

async function saveCustomer(){

  const data =
    getFormData();

  const { error } =
    await supabaseClient
      .from("customers")
      .insert([data]);

  if(error){

    alert(error.message);

    return;
  }

  alert("保存完了");

  clearInputs();

  loadCustomers();
}

async function updateCustomer(){

  const id =
    editingId.value;

  if(!id){

    alert("編集対象なし");

    return;
  }

  const data =
    getFormData();

  const { error } =
    await supabaseClient
      .from("customers")
      .update(data)
      .eq("id",id);

  if(error){

    alert(error.message);

    return;
  }

  alert("更新完了");

  clearInputs();

  loadCustomers();
}

async function loadCustomers(){

  const { data,error } =
    await supabaseClient
      .from("customers")
      .select("*")
      .order("created_at",
        {ascending:false});

  if(error){

    alert(error.message);

    return;
  }

  customers =
    data || [];

  renderTable();
}

function renderTable(){

  const keyword =
    search.value || "";

  customerTable.innerHTML = "";

  customers
    .filter(c =>

      (c.name || "")
        .includes(keyword)

      ||

      (c.address || "")
        .includes(keyword)
    )

    .forEach(c => {

      const score =
        getScore(c);

      const priority =
        getPriority(score);

      customerTable.innerHTML += `

<tr>

<td>${c.name || ""}</td>

<td>${c.name_kana || ""}</td>

<td>${c.mobile_phone || ""}</td>

<td>${c.home_phone || ""}</td>

<td>${c.birthday || ""}</td>

<td>${c.carrier || ""}</td>

<td>${c.zipcode || ""}</td>

<td>${c.address || ""}</td>

<td>${c.open_date || ""}</td>

<td>${getCallTiming(c.open_date)}</td>

<td>${score}</td>

<td>${priority}</td>

<td>${c.biglobe_10g || ""}</td>

<td>${c.nuro_2g || ""}</td>

<td>${c.nuro_10g || ""}</td>

<td>${c.ntt_area || ""}</td>

<td>${c.ntt_10g || ""}</td>

<td>${c.status || ""}</td>

<td>${c.rank || ""}</td>

<td>${c.memo || ""}</td>

<td>

<button
class="check"
onclick="editCustomer(${c.id})">

編集

</button>

<button
class="delete"
onclick="deleteCustomer(${c.id})">

削除

</button>

</td>

</tr>
`;
    });
}

function editCustomer(id){

  const c =
    customers.find(x =>
      x.id === id
    );

  if(!c)
    return;

  editingId.value =
    c.id;

  name.value =
    c.name || "";

  name_kana.value =
    c.name_kana || "";

  mobile_phone.value =
    c.mobile_phone || "";

  home_phone.value =
    c.home_phone || "";

  birthday.value =
    c.birthday || "";

  zipcode.value =
    c.zipcode || "";

  address.value =
    c.address || "";

  open_date.value =
    c.open_date || "";

  staff.value =
    c.staff || "";

  status.value =
    c.status || "未対応";

  rank.value =
    c.rank || "A";

  biglobe_10g.value =
    c.biglobe_10g || "要確認";

  nuro_2g.value =
    c.nuro_2g || "要確認";

  nuro_10g.value =
    c.nuro_10g || "要確認";

  ntt_area.value =
    c.ntt_area || "東日本";

  ntt_10g.value =
    c.ntt_10g || "要確認";

  check_date.value =
    c.check_date || "";

  area_memo.value =
    c.area_memo || "";

  memo.value =
    c.memo || "";

  scrollTo({
    top:0,
    behavior:"smooth"
  });
}

async function deleteCustomer(id){

  if(!confirm("削除しますか？"))
    return;

  const { error } =
    await supabaseClient
      .from("customers")
      .delete()
      .eq("id",id);

  if(error){

    alert(error.message);

    return;
  }

  loadCustomers();
}

function clearInputs(){

  document
    .querySelectorAll("input")
    .forEach(i => {

      if(
        i.type !== "file"
      ){
        i.value = "";
      }
    });

  editingId.value = "";
}

function exportCSV(){

  let csv =
    "名前,カナ,連絡先,住所\n";

  customers.forEach(c => {

    csv +=
      `"${c.name}","${c.name_kana}","${c.mobile_phone}","${c.address}"\n`;
  });

  const blob =
    new Blob(
      ["\uFEFF"+csv],
      {type:"text/csv"}
    );

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download =
    "customers.csv";

  a.click();
}

async function bulkImportCustomers(){

  const file =
    document.getElementById("csvFile")
      .files[0];

  if(!file){

    alert("CSVを選択してください");

    return;
  }

  const text =
    await file.text();

  const lines =
    text.split("\n");

  lines.shift();

  const rows = [];

  for(const line of lines){

    if(!line.trim())
      continue;

    const cols =
      line.split(",");

    const address =
      cols[6] || "";

    rows.push({

      name:cols[0] || "",

      name_kana:cols[1] || "",

      mobile_phone:cols[2] || "",

      home_phone:cols[3] || "",

      birthday:cols[4] || null,

      zipcode:
        cleanZip(cols[5]),

      address,

      open_date:
        cols[7] || null,

      carrier:
        detectCarrier(cols[2]),

      status:"未対応",

      rank:"C",

      biglobe_10g:
        judge10G(address),

      nuro_2g:
        judgeNuro(address),

      nuro_10g:
        judgeNuro(address),

      ntt_area:
        detectNttArea(address),

      ntt_10g:
        judge10G(address)
    });
  }

  const unique = [];

  const seen = new Set();

  rows.forEach(r => {

    const key =
      r.zipcode + r.address;

    if(!seen.has(key)){

      seen.add(key);

      unique.push(r);
    }
  });

  const chunks = [];

  for(let i=0;i<unique.length;i+=300){

    chunks.push(
      unique.slice(i,i+300)
    );
  }

  for(const chunk of chunks){

    const { error } =
      await supabaseClient
        .from("customers")
        .insert(chunk);

    if(error){

      alert(error.message);

      return;
    }
  }

  alert(
    `${unique.length}件インポート完了`
  );

  loadCustomers();
}

</script>

</body>
</html>
