<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>光回線 営業管理ツール</title>
</head>
<body>
  <h1>光回線 営業管理ツール</h1>

  <input id="name" placeholder="名前"><br><br>
  <input id="phone" placeholder="電話番号"><br><br>
  <input id="address" placeholder="住所"><br><br>

  <button onclick="checkCarrier()">判定する</button>

  <p id="result">推定キャリア：未判定</p>

  <script>
    function checkCarrier() {
      const phone = document.getElementById("phone").value.replace(/[^0-9]/g, "");
      const prefix = phone.substring(0, 5);

      let carrier = "不明";

      if (prefix === "08030") {
        carrier = "SoftBank系";
      } else if (prefix === "08050") {
        carrier = "au系";
      } else if (prefix === "08077") {
        carrier = "docomo系";
      }

      document.getElementById("result").textContent = "推定キャリア：" + carrier;
    }
  </script>
</body>
</html>
